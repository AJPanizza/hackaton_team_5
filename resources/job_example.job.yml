resources:
  jobs:
    example_project_main:
      name: "Example Project Main Job"

      tasks:
        - task_key: "placeholder_task"
          notebook_task:
            notebook_path: ../src/placeholder.py
            base_parameters:
              catalog: ${var.catalog}
              bronze_schema: ${resources.schemas.bronze_schema.name}
              silver_schema: ${resources.schemas.silver_schema.name}
              gold_schema: ${resources.schemas.gold_schema.name}


      timeout_seconds: 3600 # 1 hour timeout
      max_concurrent_runs: 1

      tags:
        project: "Hackathon"